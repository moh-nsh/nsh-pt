function getAlerts(p,stages){
  const a=[];if(!p)return a;
  if(p.budget>0&&Number(p.spent||0)/Number(p.budget)>.9)a.push({sev:"w",msg:"نسبة الصرف تجاوزت 90%",icon:"💰"});
  if(p.plannedEnd&&overdue(p.plannedEnd)&&!p.actualEnd)a.push({sev:"d",msg:"تجاوز تاريخ الإنجاز المخطط",icon:"📅"});
  stages.forEach(s=>{
    if(s.endDate&&overdue(s.endDate)&&s.status!=="completed")a.push({sev:"d",msg:"المرحلة "+s.name+" متأخرة",icon:"⚠️"});
    (s.tasks||[]).forEach(t=>{if(t.dueDate&&overdue(t.dueDate)&&t.status!=="done")a.push({sev:"d",msg:"المهمة "+t.title+" متأخرة",icon:"📌"});});
  });
  return a;
}

const INP="width:100%;padding:9px 13px;border:1.5px solid #d1d5db;border-radius:8px;font-size:14px;background:#fafafa;outline:none;font-family:Cairo,sans-serif;";
function el(tag,attrs,...ch){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="string")e.style.cssText=v;
    else if(k==="className")e.className=v;
    else if(k.startsWith("on")&&typeof v==="function")e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="checked"&&tag==="input")e.checked=v;
    else if(k==="disabled")e.disabled=v;
    else if(k==="value"&&(tag==="input"||tag==="textarea"||tag==="select"))e.value=v;
    else if(k==="src")e.src=v;
    else if(k==="alt")e.alt=v;
    else e.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{
    if(c===null||c===undefined||c===false||c===true)return;
    if(typeof c==="string"||typeof c==="number"){e.appendChild(document.createTextNode(String(c)));return;}
    if(c instanceof Node){e.appendChild(c);return;}
  });
  return e;
}

function Ring(pv,sz=72,clr="#0284c7"){
  const r=28,circ=2*Math.PI*r,v=Math.min(100,Math.max(0,pv||0));
  const ns="http://www.w3.org/2000/svg",svg=document.createElementNS(ns,"svg");

  const txt=document.createElementNS(ns,"text");txt.setAttribute("x",32);txt.setAttribute("y",36);txt.setAttribute("text-anchor","middle");txt.style.cssText=`font-size:13px;font-weight:900;fill:${clr};transform:rotate(90deg) translate(0,-64px);font-family:Cairo,sans-serif`;txt.textContent=v+"%";
  svg.appendChild(mk("none","#e2e8f0",6));svg.appendChild(mk("none",clr,6,circ,circ-(v/100)*circ));svg.appendChild(txt);

}

async function deleteProject(id){if(!confirm("حذف هذا المشروع نهائياً؟"))return;const sids=S.stages.filter(s=>s.projectId===id).map(s=>s.id);await fbDel("projects",id);for(const sid of sids)await fbDel("stages",sid);if(S.selProj?.id===id)setState({selProj:null});}
async function saveStage(s){try{await fbSet("stages",s.id,s);await addLog("stage_save","حفظ مرحلة: "+s.name,S.user);closeModal();}catch(e){alert("خطأ: "+e.message);}}
async function deleteStage(id){if(!confirm("حذف هذه المرحلة؟"))return;await fbDel("stages",id);}
async function saveUser(u){
  try{
    // Check empId uniqueness
    const existing=S.users.find(x=>x.empId===u.empId&&x.id!==u.id);
    if(existing){alert("الرقم الوظيفي مستخدم مسبقاً - يرجى اختيار رقم مختلف");return;}
    await fbSet("users",u.id,u);
    closeModal();
  }catch(e){alert("خطأ: "+e.message);}
}
async function saveAdminCreds(creds){
  try{await db.collection("settings").doc("admin").set(creds);closeModal();alert("تم تحديث بيانات المشرف بنجاح ✅");}
  catch(e){alert("خطأ: "+e.message);}
}
async function deleteUser(id){if(!confirm("حذف هذا المستخدم؟"))return;await fbDel("users",id);}
async function updateStage(s,fin,projId){
  try{
    await fbSet("stages",s.id,s);
    await addLog("stage_update","تحديث مرحلة: "+s.name+" → "+s.status+" ("+s.completionPct+"%)",S.user);
    if(fin&&projId){const proj=S.projects.find(p=>p.id===projId);if(proj)await fbSet("projects",projId,{...proj,...fin});}
    closeModal();
  }catch(e){alert("خطأ: "+e.message);}
}

function doLogin(empId,password){
  const ac=S.adminCreds;
  if(empId.trim()===ac.username&&password===ac.password){
    setState({user:{role:"admin",name:"المشرف العام",empId:ac.username},loginErr:""});startListeners();return;
  }
  const f=S.users.find(u=>u.empId===empId.trim()&&u.password===password);
  if(f){setState({user:f,loginErr:""});startListeners();}
  else setState({loginErr:"الرقم الوظيفي أو كلمة المرور غير صحيحة"});
}
function startListeners(){
  unsubs.forEach(u=>u());unsubs=[];setState({loading:true});
  let pc=false,sc=false,uc=false,lc=false,ac=false;
  const check=()=>{if(pc&&sc&&uc&&lc&&ac)setState({loading:false});};
  unsubs.push(fbListen("projects",d=>{setState({projects:d});pc=true;check();}));
  unsubs.push(fbListen("stages",d=>{setState({stages:d});sc=true;check();}));
  unsubs.push(fbListen("users",d=>{setState({users:d});uc=true;check();}));
  unsubs.push(db.collection("logs").orderBy("ts","desc").limit(100).onSnapshot(snap=>{const d=[];snap.forEach(doc=>d.push({id:doc.id,...doc.data()}));setState({logs:d});lc=true;check();}));
  // Load admin credentials from Firestore
  unsubs.push(db.collection("settings").doc("admin").onSnapshot(doc=>{
    if(doc.exists){setState({adminCreds:doc.data()});}
    else{// Initialize default admin creds
      db.collection("settings").doc("admin").set({username:"Admin",password:"MOH2026"}).catch(()=>{});
    }
    ac=true;check();
  }));
  setTimeout(()=>setState({loading:false}),6000);
}
// Pre-load users + admin creds for login validation
fbListen("users",d=>{if(!S.user)setState({users:d});});
db.collection("settings").doc("admin").onSnapshot(doc=>{if(doc.exists&&!S.user)setState({adminCreds:doc.data()});});

    if(type==="addProj"||type==="editProj")modalEl=buildProjModal(type==="editProj"?data:null);

    else if(type==="addUser")modalEl=buildUserModal(null);

  const wrapper=div({style:"display:flex;min-height:100vh;background:#eef2f7;font-family:Cairo,sans-serif"});
