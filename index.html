const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6).toUpperCase();

const gtst=v=>TSTATS.find(s=>s.v===v)||TSTATS[0];

const fmt=n=>Number(n||0).toLocaleString("en-OM");
const pct=(a,b)=>b>0?Math.min(100,Math.round(Number(a)/Number(b)*100)):0;
const overdue=d=>d&&new Date(d)<new Date();

/* Firebase CRUD */
async function fbSet(col,id,data){await db.collection(col).doc(id).set(data);}
async function fbDel(col,id){await db.collection(col).doc(id).delete();}
function fbListen(col,cb){
  return db.collection(col).onSnapshot(snap=>{
    const docs=[];
    snap.forEach(d=>docs.push({id:d.id,...d.data()}));
    cb(docs);
  });
}

function getAlerts(p,stages){
  const a=[];
  if(!p)return a;
  if(p.budget>0&&Number(p.spent||0)/Number(p.budget)>.9)a.push({sev:"w",msg:"نسبة الصرف تجاوزت 90%",icon:"💰"});
  if(p.plannedEnd&&overdue(p.plannedEnd)&&!p.actualEnd)a.push({sev:"d",msg:"تجاوز تاريخ الإنجاز المخطط",icon:"📅"});
  stages.forEach(s=>{
    if(s.endDate&&overdue(s.endDate)&&s.status!=="completed")a.push({sev:"d",msg:"المرحلة "+s.name+" متأخرة",icon:"⚠️"});
    (s.tasks||[]).forEach(t=>{if(t.dueDate&&overdue(t.dueDate)&&t.status!=="done")a.push({sev:"d",msg:"المهمة "+t.title+" متأخرة",icon:"📌"});});
  });
  return a;
}

function setState(patch){
  Object.assign(STATE,typeof patch==="function"?patch(STATE):patch);

/* ══════════════════════════════════════════
   DB ACTIONS
══════════════════════════════════════════ */
async function saveProject(p){
  try{await fbSet("projects",p.id,p);closeModal();}
  catch(e){alert("خطأ في الحفظ: "+e.message);}
}
async function deleteProject(id){
  if(!confirm("حذف هذا المشروع نهائياً؟"))return;
  const sids=STATE.stages.filter(s=>s.projectId===id).map(s=>s.id);
  await fbDel("projects",id);
  for(const sid of sids)await fbDel("stages",sid);
  if(STATE.selProj&&STATE.selProj.id===id)setState({selProj:null});
}
async function saveStage(s){
  try{await fbSet("stages",s.id,s);closeModal();}
  catch(e){alert("خطأ في الحفظ: "+e.message);}
}
async function deleteStage(id){
  if(!confirm("حذف هذه المرحلة؟"))return;
  await fbDel("stages",id);
}
async function saveUser(u){
  try{await fbSet("users",u.id,u);closeModal();}
  catch(e){alert("خطأ في الحفظ: "+e.message);}
}
async function deleteUser(id){
  if(!confirm("حذف هذا المستخدم؟"))return;
  await fbDel("users",id);
}
async function updateStage(s,fin,projId){
  try{
    await fbSet("stages",s.id,s);
    if(fin&&projId){
      const proj=STATE.projects.find(p=>p.id===projId);
      if(proj)await fbSet("projects",projId,{...proj,...fin});
    }
    closeModal();
  }catch(e){alert("خطأ: "+e.message);}
}

function closeModal(){setState({modal:null});}

/* ══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════ */
function doLogin(code){
  if(code.trim()===ADMIN){
    setState({user:{role:"admin",name:"المشرف العام",code},loginErr:""});
    startListeners();
  }else{
    const f=STATE.users.find(u=>u.code===code.trim());
    if(f){setState({user:f,loginErr:""});startListeners();}
    else setState({loginErr:"رمز الدخول غير صحيح / Invalid code"});
  }
}

function startListeners(){
  unsubs.forEach(u=>u());
  unsubs=[];
  setState({loading:true});
  let pc=false,sc=false,uc=false;
  const check=()=>{if(pc&&sc&&uc)setState({loading:false});};
  unsubs.push(fbListen("projects",docs=>{setState({projects:docs});pc=true;check();}));
  unsubs.push(fbListen("stages",docs=>{setState({stages:docs});sc=true;check();}));
  unsubs.push(fbListen("users",docs=>{setState({users:docs});uc=true;check();}));
  // timeout fallback
  setTimeout(()=>setState({loading:false}),5000);
}

// Pre-load users for login validation (before login)
fbListen("users",docs=>{ if(!STATE.user)setState({users:docs}); });

/* ══════════════════════════════════════════
   HTML BUILDERS
══════════════════════════════════════════ */
function el(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="string")e.style.cssText=v;
    else if(k==="className")e.className=v;
    else if(k.startsWith("on")&&typeof v==="function")e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="checked"&&tag==="input")e.checked=v;
    else if(k==="selected"&&tag==="option")e.selected=v;
    else if(k==="disabled")e.disabled=v;
    else if(k==="value"&&(tag==="input"||tag==="textarea"||tag==="select"))e.value=v;
    else if(k==="htmlFor")e.htmlFor=v;
    else if(k==="type")e.type=v;
    else e.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c===null||c===undefined||c===false)return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return e;
}
const div=(...a)=>el("div",...a);
const span=(...a)=>el("span",...a);
const btn=(...a)=>el("button",...a);
const inp=(...a)=>el("input",...a);
const sel=(...a)=>el("select",...a);
const opt=(v,t,selected)=>el("option",{value:v,selected:!!selected},t);
const h1=(...a)=>el("h1",...a);
const h2=(...a)=>el("h2",...a);
const h3=(...a)=>el("h3",...a);
const p=(...a)=>el("p",...a);
const code=(...a)=>el("code",...a);
const lbl=(...a)=>el("label",...a);
const ta=(...a)=>el("textarea",...a);

/* helper: build <select> with onChange */
function mkSel(style, onChange, ...opts){
  const s = document.createElement('select');
  s.style.cssText = style;
  opts.forEach(o => s.appendChild(o));
  s.addEventListener('change', onChange);
  return s;
}

const tbl=(...a)=>el("table",...a);
const thead=(...a)=>el("thead",...a);
const tbody=(...a)=>el("tbody",...a);
const tr=(...a)=>el("tr",...a);
const th=(...a)=>el("th",...a);
const td=(...a)=>el("td",...a);

function Btn(text,onclick,opts={}){
  const {clr="#0F2044",tc="#fff",sm=false,style="",disabled=false}=opts;
  const b=btn({
    style:`padding:${sm?"5px 12px":"9px 20px"};background:${disabled?"#e2e8f0":clr};color:${disabled?"#94a3b8":tc};border:none;border-radius:8px;font-size:${sm?12:14}px;font-weight:700;cursor:${disabled?"not-allowed":"pointer"};white-space:nowrap;${style}`,
    onClick:disabled?null:onclick,disabled
  },text);
  return b;
}
function Badge(v){const s=gst(v);return span({style:`background:${s.bg};color:${s.c};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap`},s.ar);}
function TBadge(v){const s=gtst(v);return span({style:`background:${s.bg};color:${s.c};padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700`},s.ar);}
function BarEl(pv,clr,ht=7){
  const v=Math.min(100,Math.max(0,pv||0));
  const c=clr||(v>=100?"#16a34a":v>=60?"#0284c7":"#f59e0b");
  return div({style:`background:#e2e8f0;border-radius:10px;height:${ht}px;overflow:hidden`},
    div({style:`width:${v}%;background:${c};height:100%;border-radius:10px;transition:width .6s`})
  );
}
function Ring(pv,sz=72,clr="#0284c7"){
  const r=28,circ=2*Math.PI*r,v=Math.min(100,Math.max(0,pv||0));
  const ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");
  svg.setAttribute("width",sz);svg.setAttribute("height",sz);svg.setAttribute("viewBox","0 0 64 64");
  svg.style.cssText="transform:rotate(-90deg)";
  const c1=document.createElementNS(ns,"circle");
  c1.setAttribute("cx",32);c1.setAttribute("cy",32);c1.setAttribute("r",r);c1.setAttribute("fill","none");c1.setAttribute("stroke","#e2e8f0");c1.setAttribute("stroke-width",6);
  const c2=document.createElementNS(ns,"circle");
  c2.setAttribute("cx",32);c2.setAttribute("cy",32);c2.setAttribute("r",r);c2.setAttribute("fill","none");c2.setAttribute("stroke",clr);c2.setAttribute("stroke-width",6);
  c2.setAttribute("stroke-dasharray",circ);c2.setAttribute("stroke-dashoffset",circ-(v/100)*circ);c2.setAttribute("stroke-linecap","round");c2.style.transition="stroke-dashoffset .8s";
  const txt=document.createElementNS(ns,"text");
  txt.setAttribute("x",32);txt.setAttribute("y",36);txt.setAttribute("text-anchor","middle");
  txt.style.cssText="font-size:13px;font-weight:900;fill:"+clr+";transform:rotate(90deg) translate(0,-64px);font-family:Cairo,sans-serif";
  txt.textContent=v+"%";
  svg.appendChild(c1);svg.appendChild(c2);svg.appendChild(txt);
  return svg;
}
function CardEl(content,style=""){return div({style:`background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:18px 22px;${style}`},content);}
function SectionEl(t){return div({style:"margin-top:8px;margin-bottom:14px;padding-top:14px;border-top:1px solid #e2e8f0;font-size:14px;font-weight:800;color:#0F2044"},t);}
function FldEl(ar,ch,half=false){
  return div({style:`margin-bottom:13px;width:${half?"calc(50% - 8px)":"100%"}`},
    lbl({style:"display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:4px"},ar),ch
  );
}
function TabBtn(label,active,onclick){

function ModalEl(title,content,wide=false){
  const overlay=div({
    style:"position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;direction:rtl",
    onClick:e=>{if(e.target===overlay)closeModal();}
  });
  const box=div({style:`background:#fff;border-radius:20px;width:100%;max-width:${wide?720:520}px;max-height:94vh;overflow:auto;box-shadow:0 24px 64px rgba(0,0,0,.25)`});
  const header=div({style:"display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid #e2e8f0;position:sticky;top:0;background:#fff;z-index:2"},
    el("b",{style:"color:#0F2044;font-size:16px"},title),
    btn({style:"border:none;background:#f1f5f9;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;color:#64748b;display:flex;align-items:center;justify-content:center",onClick:closeModal},"×")
  );
  const body=div({style:"padding:22px 24px"},content);
  box.appendChild(header);box.appendChild(body);overlay.appendChild(box);
  return overlay;
}

/* ══════════════════════════════════════════
   KPI GAUGE
══════════════════════════════════════════ */
function KPIGaugeEl(kpi){
  const actual=Number(kpi.actual||0),target=Number(kpi.target||1);
  const score=pct(actual,target);
  const c=score>=80?"#16a34a":score>=50?"#f59e0b":"#dc2626";
  const rd=ROLES[kpi.responsibleRole||kpi.r]||{ar:"غير محدد",c:"#64748b"};
  return div({style:"background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 2px 12px rgba(0,0,0,.07);text-align:center"},
    div({style:`font-size:11px;font-weight:700;color:${rd.c};margin-bottom:4px`},rd.ar),
    div({style:"font-size:13px;font-weight:800;color:#0F2044;margin-bottom:10px;line-height:1.3"},kpi.name||kpi.n||""),
    Ring(score,80,c),
    div({style:"margin-top:10px;display:flex;justify-content:center;gap:20px"},
      div(null,div({style:"font-size:10px;color:#94a3b8"},"الفعلي"),div({style:`font-size:16px;font-weight:900;color:${c}`},actual+" "+(kpi.unit||kpi.u||""))),
      div(null,div({style:"font-size:10px;color:#94a3b8"},"الهدف"),div({style:"font-size:16px;font-weight:900;color:#64748b"},target+" "+(kpi.unit||kpi.u||"")))
    )
  );
}

  if(!d.kpis)d.kpis=[];
  let tab="info";
  const tabCont=div({style:"padding:0"});
  function refreshTabs(){
    tabCont.innerHTML="";
    tabCont.appendChild(buildProjTabContent());
  }
  function setTab(t){tab=t;refreshTabs();}
  function setField(k,v){d[k]=v;}
  function setRole(role,k,v){if(!d[role])d[role]={};d[role][k]=v;}

  function buildProjTabContent(){
    if(tab==="info"){
      return div(null,
        FldEl("اسم المشروع / المركز الصحي",inp({style:INP,value:d.name,onInput:e=>setField("name",e.target.value),placeholder:"اسم المشروع..."})),
        div({style:"display:flex;gap:12px;flex-wrap:wrap"},
          FldEl("الموقع",inp({style:INP,value:d.location||"",onInput:e=>setField("location",e.target.value)}),true),
          FldEl("المقاول",inp({style:INP,value:d.contractor||"",onInput:e=>setField("contractor",e.target.value)}),true)
        ),
        div({style:"display:flex;gap:12px;flex-wrap:wrap"},
          FldEl("تاريخ البدء",inp({type:"date",style:INP,value:d.startDate||"",onInput:e=>setField("startDate",e.target.value)}),true),
          FldEl("تاريخ الإنجاز المخطط",inp({type:"date",style:INP,value:d.plannedEnd||"",onInput:e=>setField("plannedEnd",e.target.value)}),true)
        ),
        div({style:"display:flex;gap:12px;flex-wrap:wrap"},
          FldEl("الميزانية المعتمدة (ر.ع)",inp({type:"number",style:INP,value:d.budget||"",onInput:e=>setField("budget",e.target.value)}),true),
          FldEl("المدة (شهور)",inp({type:"number",style:INP,value:d.durationMonths||"",onInput:e=>setField("durationMonths",e.target.value)}),true)
        )
      );
    }
    if(tab==="stakeholders"){
      return div(null,...Object.entries(ROLES).map(([role,rd])=>
        div({style:`margin-bottom:10px;padding:12px 14px;background:#f8fafc;border-radius:10px;border-right:3px solid ${rd.c}`},
          div({style:`font-size:12px;font-weight:700;color:${rd.c};margin-bottom:8px`},rd.ar+" / "+rd.en),
          div({style:"display:flex;gap:10px;flex-wrap:wrap"},
            ...[["الاسم","name"],["الهاتف","phone"],["البريد","email"]].map(([l,k])=>
              div({style:"flex:1;min-width:100px"},
                lbl({style:"font-size:11px;color:#64748b;display:block;margin-bottom:3px"},l),
                inp({style:INP+"font-size:13px;",value:(d[role]||{})[k]||"",onInput:e=>setRole(role,k,e.target.value)})
              )
            )

        )

    if(tab==="kpis"){
      const templates=(KPI_TPL[d.type]||KPI_TPL.general);
      const cont=div(null,
        div({style:"margin-bottom:12px"},

function buildGlobalDash(){
  const {projects,stages}=STATE;
  const totB=projects.reduce((a,p)=>a+Number(p.budget||0),0);
  const totS=projects.reduce((a,p)=>a+Number(p.spent||0),0);
  const avgC=stages.length?Math.round(stages.reduce((a,s)=>a+(s.completionPct||0),0)/stages.length):0;
  const allTasks=stages.flatMap(s=>s.tasks||[]);
  const delayed=stages.filter(s=>s.status==="delayed"||(overdue(s.endDate)&&s.status!=="completed")).length;

      div({style:"display:flex;gap:8px"},
        Btn("✏️ تعديل المشروع",()=>setState({modal:{type:"editProj",data:project}}),{clr:"#f1f5f9",tc:"#374151",sm:true}),
        Btn("+ إضافة مرحلة",()=>setState({modal:{type:"addStage",data:{projectId:project.id}}}),{clr:"#1B8B8E",sm:true})
      )
    ),
    header,stats,
    div({style:"background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07)"},tabBar,div({style:"padding:20px 24px"},tabContent))
  );
}

function buildUsersView(){
  const{users,projects}=STATE;
  return div({className:"fi"},
    div({style:"display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"},
      div(null,h2({style:"color:#0F2044;margin:0;font-size:22px;font-weight:900"},"إدارة المستخدمين"),div({style:"font-size:12px;color:#64748b;margin-top:2px"},users.length+" مستخدم")),
      Btn("+ إضافة مستخدم",()=>setState({modal:{type:"addUser"}}),{clr:"#1B8B8E"})
    ),
    users.length===0?div({style:"background:#fff;border-radius:14px;padding:56px;text-align:center;color:#94a3b8"},div({style:"font-size:52px;margin-bottom:12px"},"👥"),div({style:"font-size:16px;font-weight:700;color:#64748b"},"لا يوجد مستخدمون")):
    div({style:"display:flex;flex-direction:column;gap:10px"},
      ...users.map(u=>{
        const rd=ROLES[u.role]||{ar:u.role,c:"#666"};const aP=projects.filter(pp=>(u.projectIds||[]).includes(pp.id));
        let copied=false;
        const copyBtn=btn({style:"border:none;background:#f1f5f9;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:14px",onClick:()=>{navigator.clipboard&&navigator.clipboard.writeText(u.code);copyBtn.textContent="✅";setTimeout(()=>copyBtn.textContent="📋",1800);}},"📋");
        return div({style:`background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);padding:14px 18px;border-right:4px solid ${rd.c}`},
          div({style:"display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px"},
            div({style:"flex:1"},
              div({style:"font-size:16px;font-weight:800;color:#0F2044;margin-bottom:2px"},u.name),
              div({style:`font-size:12px;color:${rd.c};font-weight:700`},rd.ar),
              u.phone?div({style:"font-size:12px;color:#64748b;margin-top:3px"},"📞 "+u.phone):null,
              div({style:"margin-top:8px;display:flex;flex-wrap:wrap;gap:5px"},
                aP.length===0?span({style:"font-size:11px;color:#94a3b8"},"لا توجد مشاريع مخصصة"):
                aP.map(pp=>{const pt=gpt(pp.type);return span({style:"background:#dbeafe;color:#1d4ed8;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600"},pt.icon+" "+pp.name);})
              )
            ),
            div({style:"text-align:center"},
              div({style:"font-size:11px;color:#64748b;margin-bottom:4px"},"رمز الدخول"),
              div({style:"display:flex;align-items:center;gap:6px"},
                code({style:"font-size:15px;font-weight:900;color:#0F2044;background:#f1f5f9;padding:7px 14px;border-radius:8px;letter-spacing:2px"},u.code),copyBtn
              ),
              div({style:"margin-top:7px"},Btn("🗑 حذف",()=>deleteUser(u.id),{clr:"#fee2e2",tc:"#b91c1c",sm:true,style:"width:100%"}))
            )
          )
        );
      })
    )
  );
}

function buildFocalView(){
  const{user,projects,stages}=STATE;
  const tab=STATE.focalTab||"stages";
  const rd=ROLES[user.role]||{ar:user.role,c:"#0284c7"};
  const myP=projects.filter(pp=>(user.projectIds||[]).includes(pp.id));
  const myStages=stages.filter(s=>(user.projectIds||[]).includes(s.projectId)&&(user.role==="pm"||s.responsibleRole===user.role));
  const myTasks=myStages.flatMap(s=>(s.tasks||[]).filter(t=>t.assignedRole===user.role).map(t=>({...t,stageName:s.name,stageId:s.id,projName:(projects.find(pp=>pp.id===s.projectId)||{name:""}).name})));
  const odTasks=myTasks.filter(t=>overdue(t.dueDate)&&t.status!=="done").length;

  let tabContent;
  if(tab==="stages"){
    tabContent=myP.length===0?div({style:"background:#fff;border-radius:14px;padding:48px;text-align:center;color:#94a3b8"},div({style:"font-size:48px;margin-bottom:12px"},"📋"),"لا توجد مهام مخصصة"):
    div(null,...myP.map(pp=>{
      const ps=myStages.filter(s=>s.projectId===pp.id);if(ps.length===0)return null;
      const pt=gpt(pp.type);
      return div({style:"background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:16px 20px;margin-bottom:12px"},
        div({style:"display:flex;align-items:center;gap:8px;margin-bottom:12px"},span({style:"font-size:20px"},pt.icon),div(null,div({style:"font-size:16px;font-weight:900;color:#0F2044"},pp.name),div({style:"font-size:11px;color:#64748b"},"📍 "+pp.location))),
        ...ps.map(s=>{
          const st2=gst(s.status);const myT=(s.tasks||[]).filter(t=>t.assignedRole===user.role);const doneT=myT.filter(t=>t.status==="done").length;
          const card2=div({style:`background:#f8fafc;border-radius:10px;padding:11px 13px;margin-bottom:7px;border-right:3px solid ${st2.c};cursor:pointer;transition:background .15s`,
            onClick:()=>setState({modal:{type:"updateStage",data:{stage:s,project:pp}}})
          },
            div({style:"display:flex;justify-content:space-between;align-items:flex-start;gap:10px"},
              div({style:"flex:1"},
                div({style:"font-size:13px;font-weight:800;color:#1e293b;margin-bottom:3px"},s.name),
                div({style:"font-size:11px;color:#64748b"},(s.startDate||"")+(s.endDate?" → "+s.endDate:"")),
                myT.length>0?div({style:"font-size:11px;color:#7c3aed;margin-top:3px"},"📌 "+doneT+"/"+myT.length+" مهمة منجزة"):null,
                s.updatedAt?div({style:"font-size:10px;color:#94a3b8;margin-top:2px"},"آخر تحديث: "+new Date(s.updatedAt).toLocaleDateString("ar-OM")):null
              ),
              div({style:"text-align:center"},Badge(s.status),div({style:"font-size:10px;color:#0284c7;margin-top:5px;font-weight:600"},"اضغط للتحديث ✏️"))
            ),
            div({style:"margin-top:8px"},BarEl(s.completionPct||0,rd.c))
          );
          card2.addEventListener("mouseenter",()=>card2.style.background="#eef3ff");
          card2.addEventListener("mouseleave",()=>card2.style.background="#f8fafc");
          return card2;
        })
      );
    }));
  } else {
    tabContent=myTasks.length===0?CardEl(div({style:"text-align:center;padding:24px 0;color:#94a3b8"},div({style:"font-size:40px;margin-bottom:8px"},"📌"),"لا توجد مهام فرعية مخصصة")):
    div(null,...myTasks.map(t=>{
      const ts=gtst(t.status);const od=overdue(t.dueDate)&&t.status!=="done";
      const stage=myStages.find(s=>s.id===t.stageId);
      const statSel=sel({style:`${INP}width:auto;font-size:12px;padding:5px 10px;background:${ts.bg};color:${ts.c};font-weight:700;border:none;`},...TSTATS.map(s=>opt(s.v,s.ar,t.status===s.v)));
      if(stage){statSel.addEventListener("change",e=>{const us={...stage,tasks:(stage.tasks||[]).map(x=>x.id===t.id?{...x,status:e.target.value,updatedAt:new Date().toISOString()}:x)};updateStage(us,null,null);});}
      return div({style:`background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-right:3px solid ${ts.c}`},
        div({style:"display:flex;justify-content:space-between;align-items:flex-start;gap:10px"},
          div({style:"flex:1"},
            div({style:"font-size:13px;font-weight:800;color:#1e293b;margin-bottom:2px"},(t.priority==="high"?"🔴 ":t.priority==="low"?"🟢 ":"🟡 ")+t.title),
            div({style:"font-size:11px;color:#64748b"},t.projName+" · "+t.stageName),
            t.dueDate?div({style:`font-size:11px;color:${od?"#dc2626":"#64748b"};margin-top:2px`},"📅 "+t.dueDate+(od?" ⚠️":"")):null
          ),statSel
        )
      );
    }));
  }

  return div({className:"fi"},
    div({style:`background:${rd.c}18;border:1px solid ${rd.c}25;border-radius:14px;padding:18px 22px;margin-bottom:18px;border-right:4px solid ${rd.c}`},
      div({style:"font-size:26px;margin-bottom:6px"},"👋"),
      h2({style:"margin:0 0 2px;color:#0F2044;font-size:20px;font-weight:900"},"مرحباً، "+user.name),
      div({style:`font-size:13px;color:${rd.c};font-weight:700;margin-bottom:12px`},rd.ar),
      div({style:"display:flex;gap:20px;flex-wrap:wrap"},
        ...[["مشاريعي",myP.length,"#0F2044"],["مراحل معلقة",myStages.filter(s=>s.status!=="completed").length,"#f59e0b"],["مهامي",myTasks.length,"#7c3aed"],["متأخرة",odTasks,"#dc2626"]].map(([l,v,c])=>div(null,span({style:`font-size:28px;font-weight:900;color:${c}`},v),div({style:"font-size:11px;color:#64748b"},l)))
      )
    ),
    div({style:"display:flex;border-bottom:1px solid #e2e8f0;margin-bottom:14px;background:#fff;border-radius:12px 12px 0 0;padding:0 8px"},
      TabBtn("المراحل ("+myStages.length+")",tab==="stages",()=>setState({focalTab:"stages"})),
      TabBtn("المهام الفرعية ("+myTasks.length+")",tab==="tasks",()=>setState({focalTab:"tasks"}))
    ),
    tabContent
  );
}

/* ══════════════════════════════════════════
   MAIN RENDER
══════════════════════════════════════════ */
function render(){
  const root=document.getElementById("root");
  root.innerHTML="";

  // show modal if any
  let modalEl=null;
  if(STATE.modal){
    const{type,data}=STATE.modal;
    if(type==="addProj"||type==="editProj")modalEl=buildProjModal(type==="editProj"?data:null);
    else if(type==="addStage")modalEl=buildStageModal(null,data.projectId);
    else if(type==="editStage")modalEl=buildStageModal(data,data.projectId);
    else if(type==="addUser")modalEl=buildUserModal();
    else if(type==="updateStage")modalEl=buildUpdateModal(data.stage,data.project,STATE.user);
  }

  if(!STATE.user){
    root.appendChild(buildLogin());
    if(modalEl)root.appendChild(modalEl);
    return;
  }

  if(STATE.loading){
    root.appendChild(div({style:"min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Cairo,sans-serif;flex-direction:column;gap:16px;color:#0F2044"},
      div({className:"spinning",style:"font-size:48px"},"⟳"),
      div({style:"font-size:18px;font-weight:700"},"جاري تحميل البيانات من Firebase..."),
      div({style:"font-size:13px;color:#64748b"},"Loading data...")
    ));
    return;
  }

  const wrapper=div({style:"display:flex;min-height:100vh;background:#eef2f7;font-family:Cairo,sans-serif"});
  wrapper.appendChild(buildSidebar());
  const main=div({style:"flex:1;padding:24px 28px;overflow-y:auto;max-width:calc(100% - 230px);min-height:100vh"});

  if(STATE.user.role==="admin"){
    if(STATE.view==="projects"&&STATE.selProj){
      const lp=STATE.projects.find(pp=>pp.id===STATE.selProj.id)||STATE.selProj;
      main.appendChild(buildProjDash(lp));
    } else if(STATE.view==="dashboard")main.appendChild(buildGlobalDash());
    else if(STATE.view==="projects")main.appendChild(buildProjList());
    else if(STATE.view==="users")main.appendChild(buildUsersView());
  } else {
    main.appendChild(buildFocalView());
  }

  wrapper.appendChild(main);
  root.appendChild(wrapper);
  if(modalEl)root.appendChild(modalEl);
}

// Boot
render();
</script>
