<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NSH · نظام متابعة المشاريع</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Cairo,sans-serif;background:#eef2f7;direction:rtl}
input,select,textarea,button{font-family:Cairo,sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fi{animation:fadeIn .3s ease}
@keyframes spin{to{transform:rotate(360deg)}}
.nb{border:none;background:transparent;cursor:pointer;font-family:Cairo,sans-serif}
.rh:hover{background:#f0f7ff!important}
.th{border:none;background:transparent;font-family:Cairo,sans-serif;cursor:pointer;padding:10px 18px;font-size:13px;font-weight:700;color:#64748b;border-bottom:3px solid transparent;transition:all .2s}
.th.act{color:#0F2044;border-bottom-color:#1B8B8E}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createElement:h,useState,useEffect,Fragment}=React;

/* ── DATA ── */
const ADMIN="MOH-ADMIN-2026";
const ROLES={
  pm:{ar:"مدير المشروع",en:"Project Manager",c:"#0284c7"},
  clinical:{ar:"المدير السريري",en:"Clinical Director",c:"#16a34a"},
  biomedical:{ar:"مهندس الهندسة الطبية",en:"Biomedical Eng.",c:"#ea580c"},
  it:{ar:"مسؤول تقنية المعلومات",en:"IT Officer",c:"#7c3aed"},
  hr:{ar:"منسق الموارد البشرية",en:"HR Coordinator",c:"#dc2626"},
};
const PTYPES=[
  {v:"construction",ar:"إنشاء",icon:"🏗",c:"#0284c7"},
  {v:"equipment",ar:"تجهيز",icon:"⚙️",c:"#ea580c"},
  {v:"development",ar:"تطوير تقني",icon:"💻",c:"#7c3aed"},
  {v:"maintenance",ar:"صيانة",icon:"🔧",c:"#16a34a"},
  {v:"general",ar:"عام",icon:"📋",c:"#64748b"},
];
const KPI_TPL={
  construction:[{n:"نسبة الإنجاز الإنشائي",u:"%",t:100,r:"pm"},{n:"نسبة الجودة",u:"%",t:90,r:"biomedical"},{n:"توريد المواد",u:"%",t:100,r:"pm"},{n:"حوادث السلامة",u:"حادثة",t:0,r:"pm"}],
  equipment:[{n:"المعدات المركبة",u:"%",t:100,r:"biomedical"},{n:"المعدات المختبرة",u:"%",t:100,r:"biomedical"},{n:"تدريب الكوادر",u:"%",t:100,r:"hr"}],
  development:[{n:"المتطلبات المنجزة",u:"%",t:100,r:"it"},{n:"اختبار النظام",u:"%",t:100,r:"it"},{n:"رضا المستخدمين",u:"%",t:80,r:"clinical"}],
  maintenance:[{n:"الأصول المصانة",u:"%",t:100,r:"biomedical"},{n:"تقليل التوقف",u:"%",t:80,r:"biomedical"}],
  general:[{n:"نسبة الإنجاز",u:"%",t:100,r:"pm"},{n:"رضا المستفيدين",u:"%",t:85,r:"clinical"}],
};
const STATS=[
  {v:"not_started",ar:"لم تبدأ",c:"#6b7280",bg:"#f3f4f6"},
  {v:"in_progress",ar:"قيد التنفيذ",c:"#1d4ed8",bg:"#dbeafe"},
  {v:"completed",ar:"مكتملة",c:"#15803d",bg:"#dcfce7"},
  {v:"delayed",ar:"متأخرة",c:"#b91c1c",bg:"#fee2e2"},
  {v:"on_hold",ar:"موقوفة",c:"#b45309",bg:"#fef3c7"},
];
const TSTATS=[
  {v:"pending",ar:"معلقة",c:"#6b7280",bg:"#f3f4f6"},
  {v:"in_progress",ar:"جارية",c:"#1d4ed8",bg:"#dbeafe"},
  {v:"done",ar:"منجزة",c:"#15803d",bg:"#dcfce7"},
];

/* ── UTILS ── */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6).toUpperCase();
const gst=v=>STATS.find(s=>s.v===v)||STATS[0];
const gtst=v=>TSTATS.find(s=>s.v===v)||TSTATS[0];
const gpt=v=>PTYPES.find(t=>t.v===v)||PTYPES[4];
const fmt=n=>Number(n||0).toLocaleString("en-OM");
const pct=(a,b)=>b>0?Math.min(100,Math.round(Number(a)/Number(b)*100)):0;
const overdue=d=>d&&new Date(d)<new Date();
const ls={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
};
function getAlerts(p,stages){
  const a=[];
  if(!p)return a;
  if(p.budget>0&&Number(p.spent||0)/Number(p.budget)>.9)a.push({sev:"w",msg:"نسبة الصرف تجاوزت 90%",icon:"💰"});
  if(p.plannedEnd&&overdue(p.plannedEnd)&&!p.actualEnd)a.push({sev:"d",msg:"تجاوز تاريخ الإنجاز المخطط",icon:"📅"});
  stages.forEach(s=>{
    if(s.endDate&&overdue(s.endDate)&&s.status!=="completed")a.push({sev:"d",msg:"المرحلة "+s.name+" متأخرة",icon:"⚠️"});
    (s.tasks||[]).forEach(t=>{if(t.dueDate&&overdue(t.dueDate)&&t.status!=="done")a.push({sev:"d",msg:"المهمة "+t.title+" متأخرة",icon:"📌"});});
  });
  return a;
}

/* ── MINI COMPONENTS ── */
const S=(k,v)=>({[k]:v});
const INP={width:"100%",padding:"9px 13px",border:"1.5px solid #d1d5db",borderRadius:8,fontSize:14,background:"#fafafa",outline:"none"};

function Btn({ch,onClick,clr="#0F2044",tc="#fff",sm,style,disabled}){
  return h("button",{onClick,disabled,style:{padding:sm?"5px 12px":"9px 20px",background:disabled?"#e2e8f0":clr,color:disabled?"#94a3b8":tc,border:"none",borderRadius:8,fontSize:sm?12:14,fontWeight:700,cursor:disabled?"not-allowed":"pointer",whiteSpace:"nowrap",...(style||{})}},ch);
}
function Badge({v}){const s=gst(v);return h("span",{style:{background:s.bg,color:s.c,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,whiteSpace:"nowrap"}},s.ar);}
function TBadge({v}){const s=gtst(v);return h("span",{style:{background:s.bg,color:s.c,padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:700}},s.ar);}
function Bar({p:pv,clr,h:ht=7}){
  const v=Math.min(100,Math.max(0,pv||0));
  const c=clr||(v>=100?"#16a34a":v>=60?"#0284c7":"#f59e0b");
  return h("div",{style:{background:"#e2e8f0",borderRadius:10,height:ht,overflow:"hidden"}},
    h("div",{style:{width:v+"%",background:c,height:"100%",borderRadius:10,transition:"width .6s"}}));
}
function Ring({p:pv,sz=72,clr="#0284c7"}){
  const r=28,circ=2*Math.PI*r,v=Math.min(100,Math.max(0,pv||0));
  return h("svg",{width:sz,height:sz,viewBox:"0 0 64 64",style:{transform:"rotate(-90deg)"}},
    h("circle",{cx:32,cy:32,r,fill:"none",stroke:"#e2e8f0",strokeWidth:6}),
    h("circle",{cx:32,cy:32,r,fill:"none",stroke:clr,strokeWidth:6,strokeDasharray:circ,strokeDashoffset:circ-(v/100)*circ,strokeLinecap:"round",style:{transition:"stroke-dashoffset .8s"}}),
    h("text",{x:32,y:36,textAnchor:"middle",style:{fontSize:13,fontWeight:900,fill:clr,transform:"rotate(90deg) translate(0,-64px)",fontFamily:"Cairo,sans-serif"}},v+"%")
  );
}
function Modal({title,onClose,wide,children}){
  return h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,direction:"rtl"},onClick:e=>e.target===e.currentTarget&&onClose()},
    h("div",{className:"fi",style:{background:"#fff",borderRadius:20,width:"100%",maxWidth:wide?760:520,maxHeight:"94vh",overflow:"auto",boxShadow:"0 24px 64px rgba(0,0,0,.25)"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 24px",borderBottom:"1px solid #e2e8f0",position:"sticky",top:0,background:"#fff",zIndex:2}},
        h("b",{style:{color:"#0F2044",fontSize:16}},title),
        h("button",{onClick:onClose,style:{border:"none",background:"#f1f5f9",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:18,color:"#64748b",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Cairo,sans-serif"}},"×")
      ),
      h("div",{style:{padding:"22px 24px"}},children)
    )
  );
}
function F({ar,ch,half}){
  return h("div",{style:{marginBottom:13,width:half?"calc(50% - 8px)":"100%"}},
    h("label",{style:{display:"block",fontSize:12,fontWeight:700,color:"#374151",marginBottom:4}},ar),
    ch
  );
}
function Sec({t}){return h("div",{style:{marginTop:8,marginBottom:14,paddingTop:14,borderTop:"1px solid #e2e8f0",fontSize:14,fontWeight:800,color:"#0F2044"}},t);}
function Card({ch,style}){return h("div",{style:{background:"#fff",borderRadius:14,boxShadow:"0 2px 12px rgba(0,0,0,.07)",padding:"18px 22px",...(style||{})}},ch);}
function Tab({label,active,onClick}){return h("button",{className:"th"+(active?" act":""),onClick},label);}

/* ── KPI GAUGE ── */
function KPIGauge({kpi}){
  const actual=Number(kpi.actual||0),target=Number(kpi.target||1);
  const score=pct(actual,target);
  const c=score>=80?"#16a34a":score>=50?"#f59e0b":"#dc2626";
  const rd=ROLES[kpi.r||kpi.responsibleRole]||{ar:"غير محدد",c:"#64748b"};
  return h("div",{style:{background:"#fff",borderRadius:14,padding:"14px 16px",boxShadow:"0 2px 12px rgba(0,0,0,.07)",textAlign:"center"}},
    h("div",{style:{fontSize:11,fontWeight:700,color:rd.c,marginBottom:4}},rd.ar),
    h("div",{style:{fontSize:13,fontWeight:800,color:"#0F2044",marginBottom:10,lineHeight:1.3}},kpi.name||kpi.n),
    h(Ring,{p:score,sz:80,clr:c}),
    h("div",{style:{marginTop:10,display:"flex",justifyContent:"center",gap:20}},
      h("div",null,h("div",{style:{fontSize:10,color:"#94a3b8"}},"الفعلي"),h("div",{style:{fontSize:16,fontWeight:900,color:c}},actual+" "+(kpi.unit||kpi.u||""))),
      h("div",null,h("div",{style:{fontSize:10,color:"#94a3b8"}},"الهدف"),h("div",{style:{fontSize:16,fontWeight:900,color:"#64748b"}},target+" "+(kpi.unit||kpi.u||"")))
    )
  );
}

/* ── LOGIN ── */
function Login({onLogin,err}){
  const[code,setCode]=useState("");
  return h("div",{style:{minHeight:"100vh",background:"linear-gradient(145deg,#0F2044 0%,#1a4a6e 50%,#1B8B8E 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}},
    h("div",{className:"fi",style:{background:"#fff",borderRadius:24,padding:"44px 40px",width:"100%",maxWidth:420,boxShadow:"0 28px 72px rgba(0,0,0,.35)",textAlign:"center"}},
      h("div",{style:{width:84,height:84,borderRadius:"50%",background:"linear-gradient(135deg,#0F2044,#1B8B8E)",margin:"0 auto 20px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:38,boxShadow:"0 8px 24px rgba(15,32,68,.3)"}},"🏥"),
      h("div",{style:{fontSize:10,letterSpacing:3,color:"#94a3b8",textTransform:"uppercase",marginBottom:6}},"وزارة الصحة · Ministry of Health"),
      h("h1",{style:{fontSize:22,color:"#0F2044",margin:"0 0 4px",fontWeight:900}},"نظام متابعة المشاريع"),
      h("p",{style:{color:"#64748b",fontSize:12,margin:"0 0 28px",lineHeight:1.6}},"Project Tracking System v2",h("br"),"المديرية العامة للخدمات الصحية · شمال الشرقية"),
      h("input",{type:"password",value:code,onChange:e=>setCode(e.target.value),onKeyDown:e=>e.key==="Enter"&&onLogin(code),placeholder:"أدخل رمز الدخول / Enter access code",style:{...INP,textAlign:"center",letterSpacing:4,fontSize:17,marginBottom:10,padding:13},autoFocus:true}),
      err&&h("div",{style:{color:"#dc2626",fontSize:12,marginBottom:10,background:"#fee2e2",padding:"8px 12px",borderRadius:8}},err),
      h(Btn,{ch:"دخول · Login",onClick:()=>onLogin(code),style:{width:"100%",padding:13,fontSize:16,borderRadius:12}}),
      h("div",{style:{marginTop:20,padding:"12px 16px",background:"#f0f9ff",borderRadius:12,textAlign:"right",border:"1px solid #bae6fd"}},
        h("div",{style:{fontSize:10,color:"#0369a1",fontWeight:700,marginBottom:3}},"💡 رمز المشرف الافتراضي"),
        h("code",{style:{fontSize:15,color:"#0F2044",fontWeight:800,letterSpacing:2}},ADMIN)
      )
    )
  );
}

/* ── SIDEBAR ── */
function Sidebar({user,view,onView,onLogout}){
  const isAdmin=user.role==="admin";
  const nav=isAdmin?[["dashboard","لوحة المؤشرات","📊"],["projects","المشاريع","🏗"],["users","المستخدمون","👥"]]:[["my","مهامي","✏️"]];
  const rd=isAdmin?{ar:"المشرف العام",c:"#1B8B8E"}:(ROLES[user.role]||{ar:user.role,c:"#0284c7"});
  return h("div",{style:{width:230,minHeight:"100vh",background:"#0F2044",color:"#fff",display:"flex",flexDirection:"column",flexShrink:0,position:"sticky",top:0,height:"100vh",overflowY:"auto"}},
    h("div",{style:{padding:"24px 16px 18px",borderBottom:"1px solid rgba(255,255,255,.1)",textAlign:"center"}},
      h("div",{style:{fontSize:36,marginBottom:6}},"🏥"),
      h("div",{style:{fontSize:9,color:"rgba(255,255,255,.4)",letterSpacing:2,textTransform:"uppercase"}},"وزارة الصحة · MOH"),
      h("div",{style:{fontSize:13,fontWeight:800,marginTop:4}},"نظام متابعة المشاريع"),
      h("div",{style:{fontSize:9,color:"rgba(255,255,255,.3)",marginTop:1}},"Project Tracking v2")
    ),
    h("div",{style:{padding:"14px 10px",flex:1}},
      nav.map(([v,label,icon])=>h("button",{key:v,onClick:()=>onView(v),style:{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"11px 14px",marginBottom:3,background:view===v?"rgba(27,139,142,.35)":"transparent",color:view===v?"#fff":"rgba(255,255,255,.6)",border:"none",borderRadius:10,cursor:"pointer",fontSize:14,fontFamily:"Cairo,sans-serif",textAlign:"right",borderRight:view===v?"3px solid #1B8B8E":"3px solid transparent",transition:"all .2s"}},h("span",{style:{fontSize:18}},icon),h("div",null,label)))
    ),
    h("div",{style:{padding:"14px 12px",borderTop:"1px solid rgba(255,255,255,.1)"}},
      h("div",{style:{background:"rgba(255,255,255,.08)",borderRadius:10,padding:"10px 12px",marginBottom:10}},
        h("div",{style:{fontSize:13,fontWeight:700}},user.name||rd.ar),
        h("div",{style:{marginTop:5,display:"inline-block",background:rd.c+"40",color:rd.c,padding:"1px 8px",borderRadius:8,fontSize:10,fontWeight:700}},rd.ar)
      ),
      h("button",{onClick:onLogout,style:{width:"100%",padding:8,background:"rgba(220,38,38,.18)",color:"#fca5a5",border:"1px solid rgba(220,38,38,.3)",borderRadius:8,cursor:"pointer",fontSize:13,fontFamily:"Cairo,sans-serif"}},"🚪 تسجيل خروج")
    )
  );
}

/* ── PROJECT FORM ── */
function ProjModal({proj,onSave,onClose}){
  const blank={id:"",name:"",location:"",type:"general",startDate:"",plannedEnd:"",budget:"",spent:"",contractor:"",durationMonths:"",pm:{name:"",phone:"",email:""},clinical:{name:"",phone:"",email:""},biomedical:{name:"",phone:"",email:""},it:{name:"",phone:"",email:""},hr:{name:"",phone:"",email:""},kpis:[]};
  const[d,setD]=useState(proj?{...blank,...proj,kpis:proj.kpis||[]}:blank);
  const[tab,setTab]=useState("info");
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const setC=(role,k,v)=>setD(p=>({...p,[role]:{...p[role],[k]:v}}));
  const pt=gpt(d.type);

  function addKPI(t){
    if(d.kpis.some(k=>k.name===t.n))return;
    set("kpis",[...d.kpis,{id:uid(),name:t.n,unit:t.u,target:t.t,responsibleRole:t.r,actual:0}]);
  }
  function addBlankKPI(){set("kpis",[...d.kpis,{id:uid(),name:"",unit:"%",target:100,responsibleRole:"pm",actual:0}]);}
  function updKPI(id,k,v){set("kpis",d.kpis.map(x=>x.id===id?{...x,[k]:v}:x));}
  function delKPI(id){set("kpis",d.kpis.filter(x=>x.id!==id));}

  const templates=(KPI_TPL[d.type]||KPI_TPL.general);

  return h(Modal,{title:proj?"تعديل المشروع":"مشروع جديد",onClose,wide:true},
    h("div",{style:{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}},
      PTYPES.map(t=>h("button",{key:t.v,onClick:()=>set("type",t.v),style:{display:"flex",alignItems:"center",gap:6,padding:"7px 13px",borderRadius:10,border:"2px solid "+(d.type===t.v?t.c:"#e2e8f0"),background:d.type===t.v?t.c+"18":"#f8fafc",cursor:"pointer",fontSize:12,fontWeight:700,color:d.type===t.v?t.c:"#64748b",fontFamily:"Cairo,sans-serif"}},t.icon," ",t.ar))
    ),
    h("div",{style:{display:"flex",borderBottom:"1px solid #e2e8f0",marginBottom:16}},
      ["info","stakeholders","kpis"].map((v,i)=>h(Tab,{key:v,label:["المعلومات","الجهات المعنية","مؤشرات KPI"][i],active:tab===v,onClick:()=>setTab(v)}))
    ),
    tab==="info"&&h("div",null,
      h(F,{ar:"اسم المشروع / المركز الصحي",ch:h("input",{style:INP,value:d.name,onChange:e=>set("name",e.target.value),placeholder:"اسم المشروع..."})}),
      h("div",{style:{display:"flex",gap:12}},
        h(F,{ar:"الموقع",half:true,ch:h("input",{style:INP,value:d.location,onChange:e=>set("location",e.target.value)})}),
        h(F,{ar:"المقاول",half:true,ch:h("input",{style:INP,value:d.contractor,onChange:e=>set("contractor",e.target.value)})})
      ),
      h("div",{style:{display:"flex",gap:12}},
        h(F,{ar:"تاريخ البدء",half:true,ch:h("input",{type:"date",style:INP,value:d.startDate,onChange:e=>set("startDate",e.target.value)})}),
        h(F,{ar:"تاريخ الإنجاز المخطط",half:true,ch:h("input",{type:"date",style:INP,value:d.plannedEnd,onChange:e=>set("plannedEnd",e.target.value)})})
      ),
      h("div",{style:{display:"flex",gap:12}},
        h(F,{ar:"الميزانية المعتمدة (ر.ع)",half:true,ch:h("input",{type:"number",style:INP,value:d.budget,onChange:e=>set("budget",e.target.value)})}),
        h(F,{ar:"المدة (شهور)",half:true,ch:h("input",{type:"number",style:INP,value:d.durationMonths,onChange:e=>set("durationMonths",e.target.value)})})
      )
    ),
    tab==="stakeholders"&&h("div",null,
      Object.entries(ROLES).map(([role,rd])=>h("div",{key:role,style:{marginBottom:10,padding:"12px 14px",background:"#f8fafc",borderRadius:10,borderRight:"3px solid "+rd.c}},
        h("div",{style:{fontSize:12,fontWeight:700,color:rd.c,marginBottom:8}},rd.ar+" / "+rd.en),
        h("div",{style:{display:"flex",gap:10}},
          [["الاسم","name"],["الهاتف","phone"],["البريد","email"]].map(([l,k])=>h("div",{key:k,style:{flex:1}},
            h("label",{style:{fontSize:11,color:"#64748b",display:"block",marginBottom:3}},l),
            h("input",{style:{...INP,fontSize:13},value:(d[role]||{})[k]||"",onChange:e=>setC(role,k,e.target.value)})
          ))
        )
      ))
    ),
    tab==="kpis"&&h("div",null,
      h("div",{style:{marginBottom:12}},
        h("div",{style:{fontSize:12,fontWeight:700,color:"#374151",marginBottom:8}},"📌 اقتراحات حسب نوع المشروع:"),
        h("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
          templates.map(t=>{const added=d.kpis.some(k=>k.name===t.n);return h("button",{key:t.n,onClick:()=>addKPI(t),disabled:added,style:{padding:"4px 12px",borderRadius:20,fontSize:11,fontWeight:700,border:"1.5px solid "+(added?"#d1d5db":"#1B8B8E"),background:added?"#f1f5f9":"#f0fdfa",color:added?"#94a3b8":"#0f766e",cursor:added?"default":"pointer",fontFamily:"Cairo,sans-serif"}},(added?"✅ ":"")+t.n);})
        )
      ),
      d.kpis.map((k,i)=>h("div",{key:k.id,style:{background:"#f8fafc",borderRadius:10,padding:"12px 14px",marginBottom:8,border:"1px solid #e2e8f0"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
          h("span",{style:{fontSize:12,fontWeight:700,color:"#0F2044"}},"مؤشر "+(i+1)),
          h(Btn,{ch:"× حذف",sm:true,clr:"#fee2e2",tc:"#b91c1c",onClick:()=>delKPI(k.id)})
        ),
        h("div",{style:{display:"flex",flexWrap:"wrap",gap:10}},

        const pt=gpt(project.type);
        return h("div",{key:project.id,style:{background:"#fff",borderRadius:14,boxShadow:"0 2px 12px rgba(0,0,0,.07)",padding:"16px 20px",marginBottom:12}},
          h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:12}},h("span",{style:{fontSize:20}},pt.icon),h("div",null,h("div",{style:{fontSize:16,fontWeight:900,color:"#0F2044"}},project.name),h("div",{style:{fontSize:11,color:"#64748b"}},"📍 "+project.location))),
          ps.map(s=>{
            const st=gst(s.status);const myT=(s.tasks||[]).filter(t=>t.assignedRole===user.role);const doneT=myT.filter(t=>t.status==="done").length;
            return h("div",{key:s.id,onClick:()=>setSel({stage:s,project}),style:{background:"#f8fafc",borderRadius:10,padding:"11px 13px",marginBottom:7,borderRight:"3px solid "+st.c,cursor:"pointer",transition:"background .15s"},onMouseEnter:e=>e.currentTarget.style.background="#eef3ff",onMouseLeave:e=>e.currentTarget.style.background="#f8fafc"},
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}},
                h("div",{style:{flex:1}},
                  h("div",{style:{fontSize:13,fontWeight:800,color:"#1e293b",marginBottom:3}},s.name),
                  h("div",{style:{fontSize:11,color:"#64748b"}},(s.startDate||"")+(s.endDate?" → "+s.endDate:"")),
                  myT.length>0&&h("div",{style:{fontSize:11,color:"#7c3aed",marginTop:3}},"📌 "+doneT+"/"+myT.length+" مهمة منجزة"),
                  s.updatedAt&&h("div",{style:{fontSize:10,color:"#94a3b8",marginTop:2}},"آخر تحديث: "+new Date(s.updatedAt).toLocaleDateString("ar-OM"))
                ),
                h("div",{style:{textAlign:"center"}},h(Badge,{v:s.status}),h("div",{style:{fontSize:10,color:"#0284c7",marginTop:5,fontWeight:600}},"اضغط للتحديث ✏️"))
              ),
              h("div",{style:{marginTop:8}},h(Bar,{p:s.completionPct||0,clr:rd.c}))
            );
          })
        );
      })
    ),
    tab==="tasks"&&h("div",null,
      myTasks.length===0?h(Card,{ch:h("div",{style:{textAlign:"center",padding:"24px 0",color:"#94a3b8"}},h("div",{style:{fontSize:40,marginBottom:8}},"📌"),"لا توجد مهام فرعية مخصصة")}):
      myTasks.map(t=>{
        const ts=gtst(t.status);const od=overdue(t.dueDate)&&t.status!=="done";
        const stage=myStages.find(s=>s.id===t.stageId);
        return h("div",{key:t.id,style:{background:"#fff",borderRadius:12,padding:"12px 16px",marginBottom:8,boxShadow:"0 2px 8px rgba(0,0,0,.06)",borderRight:"3px solid "+ts.c}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}},
            h("div",{style:{flex:1}},
              h("div",{style:{fontSize:13,fontWeight:800,color:"#1e293b",marginBottom:2}},(t.priority==="high"?"🔴 ":t.priority==="low"?"🟢 ":"🟡 ")+t.title),
              h("div",{style:{fontSize:11,color:"#64748b"}},t.projName+" · "+t.stageName),
              t.dueDate&&h("div",{style:{fontSize:11,color:od?"#dc2626":"#64748b",marginTop:2}},"📅 "+t.dueDate+(od?" ⚠️":"")),
              t.notes&&h("div",{style:{fontSize:11,color:"#94a3b8",marginTop:2}},t.notes)
            ),
            stage&&h("select",{value:t.status,onChange:e=>{const us={...stage,tasks:(stage.tasks||[]).map(x=>x.id===t.id?{...x,status:e.target.value,updatedAt:new Date().toISOString()}:x)};onUpdate(us,null);},style:{...INP,width:"auto",fontSize:12,padding:"5px 10px",background:ts.bg,color:ts.c,fontWeight:700,border:"none"}},
              TSTATS.map(s=>h("option",{key:s.v,value:s.v},s.ar))
            )
          )
        );
      })
    ),
    sel&&h(UpdateModal,{stage:sel.stage,project:sel.project,user,onClose:()=>setSel(null),onSave:(us,fin)=>{onUpdate(us,fin,sel.project.id);setSel(null);}})
  );
}

/* ── MAIN APP ── */
function App(){
  const[user,setUser]=useState(null);
  const[err,setErr]=useState("");
  const[projects,setProjects]=useState(()=>ls.get("moh_p3")||[]);
  const[stages,setStages]=useState(()=>ls.get("moh_s3")||[]);
  const[users,setUsers]=useState(()=>ls.get("moh_u3")||[]);
  const[view,setView]=useState("dashboard");
  const[selP,setSelP]=useState(null);
  const[showAP,setShowAP]=useState(false);
  const[editP,setEditP]=useState(null);
  const[showAS,setShowAS]=useState(null);
  const[editS,setEditS]=useState(null);
  const[showAU,setShowAU]=useState(false);

  const saveP=p=>{setProjects(p);ls.set("moh_p3",p);};
  const saveS=s=>{setStages(s);ls.set("moh_s3",s);};
  const saveU=u=>{setUsers(u);ls.set("moh_u3",u);};

  function login(code){
    if(code.trim()===ADMIN){setUser({role:"admin",name:"المشرف العام",code});setErr("");}
    else{const f=users.find(u=>u.code===code.trim());if(f){setUser(f);setErr("");}else setErr("رمز الدخول غير صحيح / Invalid access code");}
  }
  function saveProject(p){saveP(projects.some(x=>x.id===p.id)?projects.map(x=>x.id===p.id?p:x):[...projects,p]);setShowAP(false);setEditP(null);if(selP&&selP.id===p.id)setSelP(p);}
  function delProject(id){if(!confirm("حذف هذا المشروع؟"))return;saveP(projects.filter(p=>p.id!==id));saveS(stages.filter(s=>s.projectId!==id));if(selP&&selP.id===id)setSelP(null);}
  function saveStage(s){saveS(stages.some(x=>x.id===s.id)?stages.map(x=>x.id===s.id?s:x):[...stages,s]);setShowAS(null);setEditS(null);}
  function delStage(id){if(!confirm("حذف هذه المرحلة؟"))return;saveS(stages.filter(s=>s.id!==id));}
  function saveUser(u){saveU([...users,u]);setShowAU(false);}
  function delUser(id){if(!confirm("حذف هذا المستخدم؟"))return;saveU(users.filter(u=>u.id!==id));}
  function stageUpdate(updS,fin,pid){
    if(updS)saveS(stages.map(s=>s.id===updS.id?updS:s));
    if(fin&&pid)saveP(projects.map(p=>p.id===pid?{...p,...fin}:p));
  }

  if(!user)return h(Login,{onLogin:login,err});

  function main(){
    if(user.role==="admin"){
      if(view==="projects"&&selP){
        const lp=projects.find(p=>p.id===selP.id)||selP;
        return h(ProjDash,{project:lp,stages,onBack:()=>setSelP(null),onAddStage:setShowAS,onEditStage:s=>setEditS(s),onDelStage:delStage,onEditProj:p=>setEditP(p)});
      }
      if(view==="dashboard")return h(GlobDash,{projects,stages});
      if(view==="projects")return h(ProjList,{projects,stages,onAdd:()=>setShowAP(true),onEdit:setEditP,onSelect:setSelP,onDel:delProject});
      if(view==="users")return h(UsersView,{users,projects,onAdd:()=>setShowAU(true),onDel:delUser});
    }
    return h(FocalView,{user,projects,stages,onUpdate:stageUpdate});
  }

  return h("div",{dir:"rtl",style:{display:"flex",minHeight:"100vh",background:"#eef2f7",fontFamily:"Cairo,sans-serif"}},
    h(Sidebar,{user,view,onView:v=>{setView(v);setSelP(null);},onLogout:()=>{setUser(null);setView("dashboard");}}),
    h("div",{style:{flex:1,padding:"24px 28px",overflowY:"auto",maxWidth:"calc(100% - 230px)",minHeight:"100vh"}},main()),
    (showAP||editP)&&h(ProjModal,{proj:editP,onSave:saveProject,onClose:()=>{setShowAP(false);setEditP(null);}}),
    (showAS!==null||editS)&&h(StageModal,{stage:editS,projectId:showAS||editS&&editS.projectId,onSave:saveStage,onClose:()=>{setShowAS(null);setEditS(null);}}),
    showAU&&h(UserModal,{projects,onSave:saveUser,onClose:()=>setShowAU(false)})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
